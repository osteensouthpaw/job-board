spring:
  application:
    name: job-portal

  data:
    jdbc:
      dialect: postgresql
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
          
  
  
  security:
    oauth2:
      client:
        registration:
          github:
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: user:email

logging:
  level:
    web: debug
    org:
      hibernate.SQL: DEBUG
      hibernate.orm.jdbc.bind: TRACE
      springframework:
        security: debug

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
