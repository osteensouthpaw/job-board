spring:
  application:
    name: job-portal

  data:
    jdbc:
      dialect: postgresql
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
  
  
  
  security:
    oauth2:
      client:
        registration:
          github:
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: user:email

logging:
  level:
    web: debug
    org:
      hibernate.SQL: DEBUG
      hibernate.orm.jdbc.bind: TRACE
      springframework:
        security: debug

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, beans, configprops, heapdump, httpexchanges, loggers, mappings
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true
    git:
      enabled: true
      mode: full
    build:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

info:
  app:
    name: JobMega
    description: A platform that connects jobseekers to employers
    author: Osteen Omega
    links:
      -github: https://github.com/osteensouthpaw
      -project-link: https://job-portal-frontend-nine-black.vercel.app

app:
  backend-url: http://localhost:8080
  frontend-url: http://localhost:3000